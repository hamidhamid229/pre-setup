usermgmt:
  - name: ali
    username: ali  
    shell: /bin/bash
    groups: root
    
  - name: hamed
    username: hamed
    shell: /bin/bash
    groups: root
      

permission_directory:
  - path: /etc/passwd
    owner: root
    group: root
    mode: "0644"

  - path: /etc/shadow
    owner: root
    group: shadow
    mode: "0640"

  - path: /etc/gshadow
    owner: root
    group: shadow
    mode: "0640"

  - path: /etc/group
    owner: root
    group: root
    mode: "0644"

  - path: /etc/sudoers
    owner: root
    group: root
    mode: "0440"

  - path: /var/log/auth.log
    owner: root
    group: adm
    mode: "0640"

  - path: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"

  - path: /etc/ssh/ssh_config
    owner: root
    group: root
    mode: "0644"

  - path: /boot/grub/grub.cfg
    owner: root
    group: root
    mode: "0600"
apps:
  - name: mtr
  - name: tree
  - name: htop    

myusers:
  - root
  - bin
  - daemon
  - sys
  - www-data
  - hamed
  - ali
  - ubuntu
  - kir  
